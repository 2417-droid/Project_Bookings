<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatres - BookMyShow</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="logo">Book<span>My</span>Show</a>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="movies.html">Movies</a>
            <a href="theatres.html" class="active">Theatres</a>
            <a href="bookings.html">My Bookings</a>
            <a href="admin.html">Admin</a>
        </div>
        <div class="nav-user" id="nav-user"></div>
    </nav>

    <div class="container">
        <h2 class="section-title">Theatres</h2>

        <!-- City filter -->
        <div class="city-bar" id="city-bar" style="background:transparent; padding:0; margin-bottom:1.5rem; border:none;">
            <button class="city-chip active" onclick="loadTheatres(); activateChip(this)">All Cities</button>
        </div>

        <div class="grid grid-3" id="theatres-grid"></div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        async function loadCities() {
            try {
                const cities = await CityAPI.getAll();
                const bar = document.getElementById('city-bar');
                cities.forEach(city => {
                    const chip = document.createElement('button');
                    chip.className = 'city-chip';
                    chip.textContent = city.name;
                    chip.onclick = () => {
                        activateChip(chip);
                        loadTheatresByCity(city.id);
                    };
                    bar.appendChild(chip);
                });
            } catch (e) { console.log('No cities'); }
        }

        function activateChip(el) {
            document.querySelectorAll('.city-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        async function loadTheatres() {
            showLoading('theatres-grid');
            try {
                const theatres = await TheatreAPI.getAll();
                renderTheatres(theatres);
            } catch (e) {
                showEmpty('theatres-grid', 'Could not load theatres');
            }
        }

        async function loadTheatresByCity(cityId) {
            showLoading('theatres-grid');
            try {
                const theatres = await TheatreAPI.getByCity(cityId);
                renderTheatres(theatres);
            } catch (e) {
                showEmpty('theatres-grid', 'No theatres in this city');
            }
        }

        function renderTheatres(theatres) {
            const grid = document.getElementById('theatres-grid');
            if (theatres.length === 0) { showEmpty('theatres-grid', 'No theatres found'); return; }
            grid.innerHTML = theatres.map(t => `
                <div class="card">
                    <div class="card-body">
                        <h3>🏛️ ${t.name}</h3>
                        <p>📍 ${t.address || 'N/A'}</p>
                        <p>🌆 ${t.city?.name || ''}, ${t.city?.state || ''}</p>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-sm btn-outline" onclick="viewScreens(${t.id}, '${t.name}')">View Screens</button>
                    </div>
                </div>
            `).join('');
        }

        async function viewScreens(theatreId, theatreName) {
            try {
                const screens = await ScreenAPI.getByTheatre(theatreId);
                if (screens.length === 0) { showToast('No screens found', 'info'); return; }
                let msg = `${theatreName} Screens:\n`;
                screens.forEach(s => msg += `\n• ${s.name} (${s.totalSeats || '?'} seats)`);
                alert(msg);
            } catch (e) {
                showToast('Could not load screens', 'error');
            }
        }

        loadCities();
        loadTheatres();
    </script>
</body>
</html>
